[flake8]
max-line-length = 120
exclude =
    migrations,
    __pycache__,
    .git,
    venv,
    .venv
extend-ignore =
    # E501: line too long (handled by max-line-length where reasonable)
    E501,
    # W503/W504: line break before/after binary operator (style preference)
    W503, W504
    # E722: bare except (some legitimate uses)
    # E712: == True/False (often false-positive in SQLAlchemy)
per-file-ignores =
    app/__init__.py: F401,E402
    app/api/__init__.py: F401,E402
    app/main/__init__.py: F401,E402
    app/main/routes.py: F401
    app/services/*.py: F541
    app/api/*.py: F541
